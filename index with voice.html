<!DOCTYPE html>
<html>
<head>
<title>AI Voice Translator Bot</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

#chat{
width:60%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
min-height:300px;
}

.message{
margin:10px;
padding:10px;
border-radius:8px;
}

.user{
background:#d1e7ff;
}

.bot{
background:#d4ffd1;
}

textarea{
width:60%;
height:60px;
}

button{
padding:10px 20px;
margin:5px;
}

</style>
</head>

<body>

<h2>🌍 AI Voice Translator Bot</h2>

<div id="chat"></div>

<br>

<textarea id="text" placeholder="Type or speak..."></textarea>

<br><br>

<select id="language">
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="hi">Hindi</option>
<option value="ja">Japanese</option>
</select>

<br><br>

<button onclick="translateText()">Translate</button>

<button onclick="startVoice()">🎤 Speak</button>

<script src="script2.js"></script>

</body>
</html>
